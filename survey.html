<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>二壘營會調查</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --brand: #1B6B3A;
  --brand-dark: #145530;
  --brand-light: #E6F4EC;
  --brand-glow: #2ECC71;
  --gold: #D4A24E;
  --gold-light: #FFF8ED;
  --surface: #FFFFFF;
  --bg: #F4F6F3;
  --text: #1A2E1A;
  --text-sec: #5A6B5A;
  --text-hint: #94A394;
  --border: #D8E0D8;
  --danger: #D32F2F;
  --danger-bg: #FFF0F0;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 2px 8px rgba(27,107,58,0.08);
  --shadow-lg: 0 8px 32px rgba(27,107,58,0.12);
  --font: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ── Loading Screen ── */
.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--brand);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
.loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.loading-icon {
  width: 48px; height: 48px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  margin-top: 16px;
  letter-spacing: 1px;
}

/* ── Hero Header ── */
.hero {
  background: linear-gradient(145deg, var(--brand) 0%, var(--brand-dark) 100%);
  padding: 32px 24px 28px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
  border-radius: 50%;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(46,204,113,0.1) 0%, transparent 70%);
  border-radius: 50%;
}
.hero-church {
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.7;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 1px;
  position: relative;
}
.hero-sub {
  font-size: 13px;
  opacity: 0.75;
  margin-top: 6px;
  line-height: 1.5;
}

/* ── User Badge ── */
.user-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(4px);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  margin-top: 16px;
  position: relative;
}
.user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  object-fit: cover;
}
.user-avatar-placeholder {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: rgba(255,255,255,0.5);
}
.user-display-name {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
}

/* ── Main Content ── */
.main { padding: 20px 16px 120px; max-width: 480px; margin: 0 auto; }

/* ── Card ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--brand);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon {
  width: 22px; height: 22px;
  background: var(--brand-light);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

/* ── Input ── */
.input-group { margin-bottom: 0; }
.input-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sec);
  margin-bottom: 6px;
}
.input-label .required {
  color: var(--danger);
  margin-left: 2px;
}
.text-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.text-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(27,107,58,0.1);
  background: #fff;
}
.text-input::placeholder { color: var(--text-hint); }

/* ── Option Cards (Radio/Checkbox style) ── */
.option-group { display: flex; flex-direction: column; gap: 10px; }
.option-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.option-card:active { transform: scale(0.985); }
.option-card.selected {
  border-color: var(--brand);
  background: var(--brand-light);
  box-shadow: 0 0 0 3px rgba(27,107,58,0.08);
}
.option-card.selected .option-radio {
  border-color: var(--brand);
  background: var(--brand);
}
.option-card.selected .option-radio::after {
  content: '';
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
}
.option-radio {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.option-content { flex: 1; }
.option-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.option-desc {
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 2px;
}
.option-emoji {
  font-size: 20px;
  flex-shrink: 0;
}

/* ── Submit Button ── */
.submit-area {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(0deg, var(--surface) 80%, transparent);
  z-index: 50;
}
.submit-btn {
  display: block;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font);
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(27,107,58,0.25);
}
.submit-btn:active { transform: scale(0.98); background: var(--brand-dark); }
.submit-btn:disabled {
  background: var(--border);
  color: var(--text-hint);
  box-shadow: none;
  cursor: not-allowed;
}
.submit-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}

/* ── Result Screen ── */
.result-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px;
  min-height: 60vh;
}
.result-screen.show { display: flex; }
.result-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin-bottom: 20px;
}
.result-icon.success { background: var(--brand-light); }
.result-icon.already { background: var(--gold-light); }
.result-icon.error   { background: var(--danger-bg); }
.result-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.result-msg {
  font-size: 14px;
  color: var(--text-sec);
  line-height: 1.6;
  max-width: 280px;
}
.result-btn {
  margin-top: 28px;
  padding: 12px 32px;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}
.result-btn:active { transform: scale(0.97); }

/* ── Error Banner ── */
.error-banner {
  display: none;
  background: var(--danger-bg);
  color: var(--danger);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
  text-align: center;
  animation: shake 0.3s ease;
}
.error-banner.show { display: block; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* ── Utilities ── */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-icon"></div>
  <div class="loading-text">載入中⋯</div>
</div>

<!-- Hero -->
<div class="hero" id="heroSection">
  <div class="hero-church">花蓮靈糧堂</div>
  <h1>二壘營會調查</h1>
  <div class="hero-sub">門徒培育系統 — 營會報名 & 班別選課</div>
  <div class="user-badge" id="userBadge" style="display:none;">
    <div class="user-avatar-placeholder" id="avatarSlot">👤</div>
    <div class="user-display-name" id="displayName">—</div>
  </div>
</div>

<!-- Form -->
<div class="main" id="formSection">
  <div class="error-banner" id="errorBanner"></div>

  <!-- 姓名 -->
  <div class="card">
    <div class="card-title"><div class="icon">✏️</div>基本資料</div>
    <div class="input-group">
      <label class="input-label">姓名<span class="required">*</span></label>
      <input type="text" class="text-input" id="nameInput" placeholder="請輸入你的真實姓名" autocomplete="name" />
    </div>
  </div>

  <!-- 是否參加營會 -->
  <div class="card">
    <div class="card-title"><div class="icon">🏕️</div>二壘營會</div>
    <div class="option-group" id="campGroup">
      <div class="option-card" data-value="參加" onclick="selectOption('camp', this)">
        <div class="option-radio"></div>
        <div class="option-content">
          <div class="option-title">參加</div>
          <div class="option-desc">我要參加二壘營會</div>
        </div>
        <div class="option-emoji">🙋</div>
      </div>
      <div class="option-card" data-value="不參加" onclick="selectOption('camp', this)">
        <div class="option-radio"></div>
        <div class="option-content">
          <div class="option-title">不參加</div>
          <div class="option-desc">這次先不參加營會</div>
        </div>
        <div class="option-emoji">🙅</div>
      </div>
    </div>
  </div>

  <!-- 二壘班別 -->
  <div class="card">
    <div class="card-title"><div class="icon">📖</div>二壘班別選課</div>
    <div class="option-group" id="classGroup">
      <div class="option-card" data-value="先知性門徒班" onclick="selectOption('class', this)">
        <div class="option-radio"></div>
        <div class="option-content">
          <div class="option-title">先知性門徒班</div>
        </div>
      </div>
      <div class="option-card" data-value="職場使者班" onclick="selectOption('class', this)">
        <div class="option-radio"></div>
        <div class="option-content">
          <div class="option-title">職場使者班</div>
        </div>
      </div>
      <div class="option-card" data-value="牧羊人班" onclick="selectOption('class', this)">
        <div class="option-radio"></div>
        <div class="option-content">
          <div class="option-title">牧羊人班</div>
        </div>
      </div>
      <div class="option-card" data-value="福音使者班" onclick="selectOption('class', this)">
        <div class="option-radio"></div>
        <div class="option-content">
          <div class="option-title">福音使者班</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Submit -->
<div class="submit-area" id="submitArea">
  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">送出</button>
</div>

<!-- Result -->
<div class="result-screen" id="resultScreen">
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-msg" id="resultMsg"></div>
  <button class="result-btn" id="resultBtn" onclick="closeLiff()">關閉</button>
</div>

<script>
// ============================================================
//  CONFIG — 部署前請填入正確值
// ============================================================
const LIFF_ID = '在此貼上你的_LIFF_ID';
const GAS_URL = '在此貼上你的_GAS_WEB_APP_URL';

// ============================================================
//  State
// ============================================================
let userId = null;
let selected = { camp: null, class: null };

// ============================================================
//  LIFF Init
// ============================================================
async function initApp() {
  try {
    await liff.init({ liffId: LIFF_ID });

    // 未登入 → 導向 LINE 登入
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    // 取得使用者資訊
    const profile = await liff.getProfile();
    userId = profile.userId;

    // 顯示使用者頭像 & 名稱
    const badge = document.getElementById('userBadge');
    const avatarSlot = document.getElementById('avatarSlot');
    const displayName = document.getElementById('displayName');

    if (profile.pictureUrl) {
      avatarSlot.outerHTML =
        '<img class="user-avatar" src="' + profile.pictureUrl + '" alt="avatar" />';
    }
    displayName.textContent = profile.displayName || '—';
    badge.style.display = 'flex';

    // 檢查是否已填過
    await checkAlreadySubmitted();

    // 隱藏 loading
    document.getElementById('loadingScreen').classList.add('hidden');

  } catch (err) {
    console.error('LIFF init error:', err);
    document.querySelector('.loading-text').textContent = '載入失敗，請重新開啟';
  }
}

// ============================================================
//  Check if already submitted (JSONP)
// ============================================================
function checkAlreadySubmitted() {
  return new Promise((resolve) => {
    if (!userId) { resolve(); return; }

    const cbName = '_cb_' + Date.now();
    const script = document.createElement('script');

    window[cbName] = function(result) {
      delete window[cbName];
      document.head.removeChild(script);

      if (result.success && result.submitted) {
        showResult('already', '你已經填過囉！', '姓名：' + result.name + '\n如需修改，可以重新填寫並送出。');
        // 允許重新填寫：顯示「重新填寫」按鈕
        document.getElementById('resultBtn').textContent = '重新填寫';
        document.getElementById('resultBtn').onclick = function() {
          document.getElementById('resultScreen').classList.remove('show');
          document.getElementById('formSection').classList.remove('hidden');
          document.getElementById('heroSection').classList.remove('hidden');
          document.getElementById('submitArea').classList.remove('hidden');
        };
      }
      resolve();
    };

    script.src = GAS_URL
      + '?callback=' + cbName
      + '&action=checkSubmitted'
      + '&userId=' + encodeURIComponent(userId);
    script.onerror = function() { delete window[cbName]; resolve(); };
    document.head.appendChild(script);
  });
}

// ============================================================
//  Option Selection
// ============================================================
function selectOption(group, el) {
  const groupId = group === 'camp' ? 'campGroup' : 'classGroup';
  const cards = document.getElementById(groupId).querySelectorAll('.option-card');
  cards.forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selected[group] = el.dataset.value;
}

// ============================================================
//  Submit
// ============================================================
async function handleSubmit() {
  // 清除錯誤
  hideError();

  // 驗證
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showError('請填寫姓名'); return; }
  if (!selected.camp) { showError('請選擇是否參加營會'); return; }
  if (!selected.class) { showError('請選擇二壘班別'); return; }

  // 禁用按鈕
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '提交中⋯';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'submitSurvey',
        userId: userId || 'unknown',
        name: name,
        joinCamp: selected.camp,
        courseClass: selected.class,
      }),
    });

    // GAS redirect 問題：用 redirect: 'follow' 或改用 no-cors
    // 但 doPost 回傳 JSON 應該沒問題
    const result = await res.json();

    if (result.success) {
      const title = result.updated ? '已更新！' : '提交成功！';
      const msg = result.updated
        ? '你的填答已更新為最新內容'
        : '感謝你的填答，期待在營會和課程中見到你！';
      showResult('success', title, msg);
    } else {
      showError(result.error || '提交失敗，請再試一次');
      resetBtn();
    }

  } catch (err) {
    console.error('Submit error:', err);

    // GAS Web App 的 POST 可能遇到 CORS redirect
    // 改用 no-cors mode 作為 fallback
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'submitSurvey',
          userId: userId || 'unknown',
          name: name,
          joinCamp: selected.camp,
          courseClass: selected.class,
        }),
      });
      // no-cors 無法讀取回應，但通常已成功
      showResult('success', '提交成功！', '感謝你的填答，期待在營會和課程中見到你！');
    } catch (err2) {
      showError('網路錯誤，請確認網路連線後再試');
      resetBtn();
    }
  }
}

function resetBtn() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.classList.remove('loading');
  btn.textContent = '送出';
}

// ============================================================
//  Result Screen
// ============================================================
function showResult(type, title, msg) {
  document.getElementById('formSection').classList.add('hidden');
  document.getElementById('heroSection').classList.remove('hidden');
  document.getElementById('submitArea').classList.add('hidden');

  const icon = document.getElementById('resultIcon');
  icon.className = 'result-icon ' + (type === 'already' ? 'already' : type);
  icon.textContent = type === 'success' ? '✅' : type === 'already' ? '📝' : '❌';

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;

  const resultBtn = document.getElementById('resultBtn');
  if (type !== 'already') {
    resultBtn.textContent = '關閉';
    resultBtn.onclick = closeLiff;
  }

  const screen = document.getElementById('resultScreen');
  screen.classList.add('show');
}

// ============================================================
//  Error
// ============================================================
function showError(msg) {
  const banner = document.getElementById('errorBanner');
  banner.textContent = msg;
  banner.classList.add('show');
  // 滑到頂部
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('show');
}

// ============================================================
//  Close LIFF
// ============================================================
function closeLiff() {
  if (liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
  }
}

// ============================================================
//  Init
// ============================================================
document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
